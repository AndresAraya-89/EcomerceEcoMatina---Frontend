<header
  class="bg-surface dark:bg-on-surface w-full sticky top-0 z-50 border-b border-outline-variant dark:border-outline shadow-sm dark:shadow-none"
>
  <div
    class="flex items-center justify-between px-margin-mobile md:px-margin-desktop py-sm max-w-max-width mx-auto w-full"
  >
    <!-- Brand -->
    <a
      class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed flex items-center gap-2"
      href="#"
    >
      <span
        class="material-symbols-outlined filled"
        data-icon="agriculture"
        style="font-variation-settings: 'FILL' 1"
        >agriculture</span
      >
      Agromatina
    </a>
    <nav class="hidden md:flex items-center gap-lg">
      <!-- Desplegable "Productos" con las categorias reales de la API (RF-04) -->
      <div class="relative">
        <button
          type="button"
          (click)="alternarProductos()"
          class="flex items-center gap-1 text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed font-label-md text-label-md transition-colors hover:bg-surface-container-low dark:hover:bg-tertiary-container px-3 py-2 rounded-DEFAULT border-b-2 border-transparent"
        >
          Productos
          <span class="material-symbols-outlined text-base">expand_more</span>
        </button>

        @if (productosAbierto()) {
          <div
            class="absolute left-0 top-full mt-2 flex w-60 flex-col gap-0.5 rounded-xl border border-outline-variant bg-surface dark:bg-on-surface p-2 shadow-xl ring-1 ring-black/5 z-50"
          >
            @for (categoria of categorias(); track categoria.codigo) {
              <a
                [routerLink]="['/categoria', categoria.codigo]"
                (click)="cerrarProductos()"
                class="w-full rounded-lg px-4 py-2.5 text-left font-label-md text-label-md text-secondary hover:bg-surface-container-low hover:text-primary transition-colors"
              >
                {{ categoria.nombre }}
              </a>
            }
          </div>
        }
      </div>

      <a
        routerLink="/cotizacion"
        routerLinkActive="!text-primary !dark:text-primary-fixed !border-b-2 !border-primary !dark:border-primary-fixed !bg-transparent"
        class="text-secondary dark:text-secondary-fixed-dim hover:text-primary dark:hover:text-primary-fixed font-label-md text-label-md transition-colors hover:bg-surface-container-low dark:hover:bg-tertiary-container px-3 py-2 rounded-DEFAULT border-b-2 border-transparent"
      >
        Cotizaciones
      </a>
    </nav>
    <!-- Actions -->
    <div class="flex items-center gap-sm">
      <!-- Mobile Menu Button -->
      <button
        class="md:hidden p-2 text-secondary hover:text-primary transition-colors hover:bg-surface-container-low rounded-DEFAULT"
      >
        <span class="material-symbols-outlined" data-icon="menu">menu</span>
      </button>
      <button
        class="p-2 text-secondary hover:text-primary transition-colors hover:bg-surface-container-low rounded-DEFAULT"
      >
        <span class="material-symbols-outlined" data-icon="search">search</span>
      </button>
      <button
        routerLink="/cart"
        aria-label="Ver carrito"
        class="p-2 text-secondary hover:text-primary transition-colors hover:bg-surface-container-low rounded-DEFAULT relative"
      >
        <span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
        @if (totalItems() > 0) {
          <span
            class="absolute top-1 right-1 bg-error text-on-error text-[10px] font-bold px-1.5 py-0.5 rounded-full leading-none"
            >{{ totalItems() }}</span
          >
        }
      </button>
      <button
        class="hidden md:block p-2 text-secondary hover:text-primary transition-colors hover:bg-surface-container-low rounded-DEFAULT"
      >
        <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
      </button>
    </div>
  </div>
</header>

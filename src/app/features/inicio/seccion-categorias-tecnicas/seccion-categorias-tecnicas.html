<section class="max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop py-xl">
  <div class="flex items-center justify-between mb-lg">
    <h2 class="font-headline-md text-headline-md text-on-surface">Lo más vendido</h2>
  </div>

  @if (destacados().length === 0) {
    <p class="py-md font-body-md text-secondary">Cargando productos…</p>
  } @else {
    <div class="grid grid-cols-2 gap-md sm:grid-cols-3 lg:grid-cols-4">
      @for (producto of destacados(); track producto.codigo) {
        <app-product-card [producto]="producto" (agregar)="agregar($event)" />
      }
    </div>
  }
</section>

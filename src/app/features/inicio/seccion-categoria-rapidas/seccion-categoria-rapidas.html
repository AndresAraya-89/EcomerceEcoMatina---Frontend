<section id="categorias" class="py-xl border-b border-surface-dim bg-surface scroll-mt-[80px]">
  <div class="max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop">
    <div class="flex items-center justify-between mb-lg">
      <h2 class="font-headline-md text-headline-md text-on-surface">Categorías</h2>
    </div>

    @if (categorias().length === 0) {
      <p class="py-md font-body-md text-secondary">Cargando categorías…</p>
    } @else {
      <div class="flex overflow-x-auto hide-scrollbar gap-md pb-sm">
        @for (categoria of categorias(); track categoria.codigo) {
          <a
            [routerLink]="['/categoria', categoria.codigo]"
            class="flex-shrink-0 flex flex-col items-center gap-sm p-md bg-surface-container-lowest border border-outline-variant hover:border-primary rounded-xl min-w-[120px] transition-all duration-200 hover:shadow-sm group"
          >
            <div
              class="w-12 h-12 rounded-full bg-surface-variant group-hover:bg-primary-container flex items-center justify-center transition-colors"
            >
              <span
                class="material-symbols-outlined text-secondary group-hover:text-on-primary-container"
                >{{ icono(categoria.codigo) }}</span
              >
            </div>
            <span
              class="font-label-md text-label-md text-on-surface-variant group-hover:text-primary text-center"
              >{{ categoria.nombre }}</span
            >
          </a>
        }
      </div>
    }
  </div>
</section>

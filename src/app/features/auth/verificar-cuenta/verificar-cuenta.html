<section class="px-margin-mobile md:px-margin-desktop py-xl flex justify-center">
  <div
    class="w-full max-w-sm rounded-xl border border-outline bg-surface-container-lowest p-lg text-center shadow-sm"
  >
    @switch (estado()) {
      @case ('verificando') {
        <div class="text-4xl">⏳</div>
        <h1 class="mt-sm font-headline-md text-headline-md font-semibold text-on-surface">
          Verificando…
        </h1>
        <p class="mt-xs font-body-md text-body-md text-secondary">Esto toma solo un momento.</p>
      }

      @case ('exito') {
        <div class="text-4xl">✅</div>
        <h1 class="mt-sm font-headline-md text-headline-md font-semibold text-primary">
          ¡Cuenta verificada!
        </h1>
        <p class="mt-xs font-body-md text-body-md text-on-surface">{{ mensaje() }}</p>
        <a
          routerLink="/auth"
          class="mt-md inline-block w-full rounded-full bg-primary px-6 py-3 font-label-md text-on-primary hover:opacity-90 transition"
        >
          Iniciar sesión
        </a>
      }

      @case ('error') {
        <div class="text-4xl">⚠️</div>
        <h1 class="mt-sm font-headline-md text-headline-md font-semibold text-error">
          No se pudo verificar
        </h1>
        <p class="mt-xs font-body-md text-body-md text-on-surface">{{ mensaje() }}</p>
        <a
          routerLink="/auth"
          class="mt-md inline-block w-full rounded-full border border-primary px-6 py-3 font-label-md text-primary hover:bg-primary-container hover:text-on-primary transition"
        >
          Ir a iniciar sesión
        </a>
      }
    }
  </div>
</section>
